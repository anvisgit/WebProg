<!DOCTYPE html>
<html>
<body>

<div id="d" onmouseover="mOver()" onmouseout="mOut()" style="width:200px;height:100px;background:gray;text-align:center;">Box</div>

<form onsubmit="return check()">
<fieldset>
<legend>Login</legend>

User: <input type="text" id="u"><br>
Pass: <input type="password" id="p"><br>

<button type="submit">Login</button>
</fieldset>
</form>

<p id="out"></p>

<script>
function mOver(){document.getElementById("d").style.background="green";}
function mOut(){document.getElementById("d").style.background="gray";}

function check(){

let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

let i=1,s="";
do{
s+=i+" ";
i++;
}while(i<=3);

document.getElementById("out").innerText=s;

if(u==""||p==""){alert("Fill all");return false;}

return false;
}
</script>

</body>
</html>
