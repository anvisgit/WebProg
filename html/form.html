<!DOCTYPE html>
<html>
    <head>
        <title>HTML FORM</title>
    </head>
    <body><form>
        <h2 align-items: center> FORM STUDENT</h2>
        <label for="name">full name</label>
        <input type="text" id="name" name="fullname" placeholder="Enter your full name"
        required
        minlength="3"
        maxlength="50">
        <br><br>
         <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="example@gmail.com"
        required
        autocomplete="email"
    >
    <br><br>

    <label for="pass">Password:</label>
    <input type="password" id="pass" name="password" required 
        minlength="6"
        maxlength="20"
    >
    <br><br>
    <label for="age">Age:</label>
    <input 
        type="number"
        id="age"
        name="age"
        min="1"
        max="100"
        step="1"
    >
    <br><br>

    <label for="dob">Date of Birth:</label>
    <input 
        type="date"
        id="dob"
        name="dob"
    >
    <br><br>
    <label>Gender:</label><br>
    <input type="radio" name="gender" value="male" > Male
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="other"> Other
    <br><br>

    <label>Skills:</label><br>
    <input type="checkbox" name="skills" value="html"> HTML
    <input type="checkbox" name="skills" value="css"> CSS
    <input type="checkbox" name="skills" value="js"> JavaScript
    <br><br>

    <label>Upload Resume:</label>
    <input 
        type="file"
        name="resume"
        accept=".pdf,.doc,.docx"
    >
    <br><br>

    <label>Country:</label>
    <select name="country" required>
        <option value="">Select</option>
        <option value="india">India</option>
        <option value="usa">USA</option>
        <option value="uk">UK</option>
    </select>
    <br><br>

    <label>About You:</label><br>
    <div 
    style="justify-content: center; align-items: center;">
    <textarea name="about" rows="5" cols="30" placeholder="Write something" maxlength="200">

    </textarea> </div>

    <br><br>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>



    </form></body>
</html>
