<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; justify-content: center; display: flex; }
.error { color: rgb(88, 4, 4); }
.box { width:200px;height:100px;background:lightblue;text-align:center;line-height:100px; }
</style>
</head>

<body>

<div class="box" id="box" onmouseover="hover()" onmouseout="normal()">Hover</div>

<form onsubmit="return validate()">

<fieldset>
<legend>Student Form</legend>

Name: <input type="text" id="name" onchange="checkName()">
<span id="nameErr" class="error"></span><br><br>

Email: <input type="text" id="email">
<span id="emailErr" class="error"></span><br><br>

Gender:
<input type="radio" name="g" value="Male">Male
<input type="radio" name="g" value="Female">Female<br><br>

Skills:
<input type="checkbox" id="c1" value="HTML">HTML
<input type="checkbox" id="c2" value="CSS">CSS<br><br>

<button type="submit">Submit</button>
<button type="button" onclick="resetForm()">Reset</button>

</fieldset>
</form>

<p id="loop"></p>

<script>

function hover(){ document.getElementById("box").style.background="orange"; }
function normal(){ document.getElementById("box").style.background="lightblue"; }

function checkName(){
    let n=document.getElementById("name").value;
    if(n.length<3) document.getElementById("nameErr").innerText="Short";
    else document.getElementById("nameErr").innerText="";
}

function validate(){

    let valid=true;

    let email=document.getElementById("email").value;
    if(!email.includes("@")){
        document.getElementById("emailErr").innerText="Invalid";
        valid=false;
    }

    let gender="";
    let r=document.getElementsByName("g");
    for(let i=0;i<r.length;i++){
        if(r[i].checked) gender=r[i].value;
    }

    let skills="";
    if(document.getElementById("c1").checked) skills+="HTML ";
    if(document.getElementById("c2").checked) skills+="CSS ";

    let i=1,text="";
    do{
        text+=i+" ";
        i++;
    }while(i<=5);

    document.getElementById("loop").innerText=text;

    if(valid) alert(gender+" "+skills);

    return false;
}

function resetForm(){
    document.getElementById("name").focus();
}

</script>

</body>
</html>
