<!DOCTYPE html>
<html>
<head>
    <title>Form </title>

    <style>
        body {
            background: #f2f6ff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: Arial;
        }

        form {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
        }

        .btns {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        button {
            width: 48%;
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .submit {
            background: green;
        }

        .reset {
            background: red;
        }
    </style>
</head>

<body>

<form>

    <h2>Student Form</h2>

    <label>Name</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Password</label>
    <input type="password">

    <label>Age</label>
    <input type="number">

    <label>Gender</label>
    <input type="radio" name="g"> Male
    <input type="radio" name="g"> Female

    <label>Skills</label>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JS

    <label>Country</label>
    <select>
        <option>India</option>
        <option>USA</option>
    </select>

    <label>About</label>
    <textarea></textarea>

    <div class="btns">
        <button class="submit">Submit</button>
        <button type="reset" class="reset">Reset</button>
    </div>

</form>

</body>
</html>
