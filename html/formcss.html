<!DOCTYPE html>
<html>
<head>
    <title>HTML FORM</title>

    <style>
body {
    background: #f2f6ff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

form {
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input[type="radio"],
input[type="checkbox"] {
    width: auto;
    margin-right: 5px;
}

.btn-container {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

button {
    width: 48%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button[type="submit"] {
    background: green;
    color: white;
}

button[type="reset"] {
    background: red;
    color: white;
}
    </style>
</head>

<body>

<form>
<br><br><br>

    <h2>FORM STUDENT</h2>

    <label for="name">Full Name</label>
    <input type="text" id="name" name="fullname" placeholder="Enter your full name"
        required minlength="3" maxlength="50">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="example@gmail.com"
        required autocomplete="email">

    <label for="pass">Password</label>
    <input type="password" id="pass" name="password"
        required minlength="6" maxlength="20">

    <label for="age">Age</label>
    <input type="number" id="age" name="age" min="1" max="100">

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" name="dob">

    <label>Gender</label>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="other"> Other

    <label>Skills</label>
    <input type="checkbox" name="skills" value="html"> HTML
    <input type="checkbox" name="skills" value="css"> CSS
    <input type="checkbox" name="skills" value="js"> JavaScript

    <label>Upload Resume</label>
    <input type="file" name="resume" accept=".pdf,.doc,.docx">

    <label>Country</label>
    <select name="country" required>
        <option value="">Select</option>
        <option value="india">India</option>
        <option value="usa">USA</option>
        <option value="uk">UK</option>
    </select>

    <label>About You</label>
    <textarea name="about" rows="5" cols="30" placeholder="Write something" maxlength="200"></textarea>

    <div class="btn-container">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>

</form>

</body>
</html>
